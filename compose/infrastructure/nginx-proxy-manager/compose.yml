services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:${NPM_VERSION}

    container_name: ${CONTAINER_NAME}

    restart: unless-stopped

    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
      - "${ADMIN_PORT}:81"

    environment:
      TZ: ${TZ}

    volumes:
      - ${DATA_PATH}:/data
      - ${LETSENCRYPT_PATH}:/etc/letsencrypt

    networks:
      - eil-network

networks:
  eil-network:
    external: true
